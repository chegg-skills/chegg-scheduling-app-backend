name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Reports known-vulnerable dependencies. Non-blocking for now (warn);
      # promote to a hard failure (drop continue-on-error) once the tree is clean.
      - name: Backend dependency audit
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for missing migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/chegg_drift_check
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE chegg_drift_check;"
          npx prisma migrate deploy
          npx prisma migrate diff \
            --from-config-datasource \
            --to-schema prisma/schema.prisma \
            --exit-code

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Create backend test env
        working-directory: backend
        run: |
          cat > .env.test <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/chegg_test?sslmode=disable
          JWT_SECRET=ci-test-jwt-secret
          BOOTSTRAP_SECRET=ci-bootstrap-secret
          NODE_ENV=test
          ENABLE_RATE_LIMITS_IN_TEST=false
          LOG_LEVEL=warn
          EOF

      - name: Test backend (with coverage gate)
        working-directory: backend
        run: npm run test:coverage

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Reports known-vulnerable frontend dependencies. Non-blocking for now.
      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  validate-notification-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: notification-service/package-lock.json

      - name: Install notification-service dependencies
        working-directory: notification-service
        run: npm ci

      - name: Generate Prisma client
        working-directory: notification-service
        run: npx prisma generate

      - name: Build notification-service
        working-directory: notification-service
        run: npm run build

      - name: Test notification-service
        working-directory: notification-service
        run: npm test
