envVarGroups:
  - name: chegg-shared-secrets
    envVars:
      - key: JWT_SECRET
        sync: false

services:
  # 1. Backend API (Web Service)
  - type: web
    name: chegg-scheduling-backend
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - fromGroup: chegg-shared-secrets
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: chegg-scheduling-frontend
          property: host
      - key: FRONTEND_URL
        fromService:
          type: web
          name: chegg-scheduling-frontend
          property: host

  # 2. Frontend (Static Site)
  - type: web
    name: chegg-scheduling-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: chegg-scheduling-backend
          property: host
